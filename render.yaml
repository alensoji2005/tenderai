services:
  - type: web
    name: tenderai-backend
    env: docker
    region: frankfurt # You can change this to a region closer to you
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tenderai-db
          property: connectionString
      # Any other secrets like JWT_SECRET can be added here
      # - key: JWT_SECRET
      #   generateValue: true

  - type: cron
    name: keep-awake
    env: docker
    region: frankfurt
    plan: free
    schedule: "*/14 * * * *" # Every 14 minutes
    # Assuming standard linux environment; curl hits the internal Render URL or external
    # We can just curl the web service's external URL to keep it awake
    # The URL will be generated by Render, so we need to inject it or use the Render hostname
    command: curl -s https://tenderai-backend.onrender.com/health > /dev/null

databases:
  - name: tenderai-db
    region: frankfurt
    plan: free
    databaseName: tenderai
    user: tenderai_user
